version: "3"

services:
  next-app:
    build:
      context: ./next-app
      dockerfile: prod.Dockerfile
      args:
        ENV_VARIABLE: ${ENV_VARIABLE}
        NEXT_PUBLIC_ENV_VARIABLE: ${NEXT_PUBLIC_ENV_VARIABLE}
    restart: always
    expose:
      - 8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.next-app.rule=Host(`next-app.dokploy.com`)
      - traefik.http.routers.next-app.entrypoints=websecure
      - traefik.http.routers.next-app.tls.certResolver=letsencrypt
      - traefik.http.services.next-app.loadbalancer.server.port=8080
      # # HTTP to HTTPS redirect
      # - traefik.http.routers.next-app-http.rule=Host(`next-app.dokploy.com`)
      # - traefik.http.routers.next-app-http.entrypoints=web
      # - traefik.http.routers.next-app-http.middlewares=redirect-to-https
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
  # Add more containers below (nginx, postgres, etc.)
# Define a network, which allows containers to communicate
# with each other, by using their container name as a hostname
